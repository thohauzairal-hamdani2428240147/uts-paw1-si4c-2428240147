<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Belanja</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container">
        <h1 class="text-center text-uppercase bg-primary text-white p-3 rounded mt-3">Daftar Belanja</h1>
        <img src="https://images.unsplash.com/photo-1745131068087-56f5ec5fa498?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Gambar Belanja" class="img-fluid mt-5 mb-5">
    </div>
    <div class="container">
        <h2>Nama Barang</h2>
            <input type="text" id="nama" placeholder="" class="form-control border-primary mb-3">
        <h2>Jumlah</h2>
            <input type="text" id="jumlah" placeholder="" class="form-control border-primary mb-3">
        <h2>Keterangan</h2>
            <input type="text" id="keterangan" placeholder="" class="form-control border-primary mb-3">
        <button onclick="simpan()" class="btn btn-primary">Simpan</button>

        <div id="list-belanja" class="row">
        </div>
    </div>

    <footer>
        <p class="bg-primary text-white p-3 p-10">Designed and built with all the love in the world by the Bootstrap team with the help of our contributors.
Code licensed MIT, docs CC BY 3.0.
Currently v5.3.8.</p>
</footer>

    <script src="script.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
